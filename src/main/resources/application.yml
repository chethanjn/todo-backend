server:
  port: ${PORT:8080}

spring:
  application:
    name: todo-backend

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
