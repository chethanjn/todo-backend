#production
server:
  port: ${PORT:8080}

spring:
  application:
    name: todo-backend

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      database: ${SPRING_DATA_MONGODB_DATABASE:todo_app}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
    expiration-ms: 86400000

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

